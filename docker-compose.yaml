services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:latest
    ports:
      - "6379:6379"

  worker:
    build: .
    command: celery -A app.celery_app worker --loglevel=info
    depends_on:
      - redis
    volumes:
      - .:/app
    
  beat:
    build: .
    command: celery -A app.celery_app beat --loglevel=info
    depends_on:
      - redis
    volumes:
      - .:/app
      